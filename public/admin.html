<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GiftHub Admin</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <main class="container">
    <p class="tag">Admin Dashboard</p>

    <h1>จัดการออเดอร์ร้านสติ๊กเกอร์</h1>

    <p>
      <a href="/">กลับหน้าร้าน</a>
    </p>

    <section class="dashboard">
      <div class="stat-card">
        <b>ยอดขายวันนี้</b>
        <span id="totalSales">0 บาท</span>
      </div>

      <div class="stat-card">
        <b>ออเดอร์วันนี้</b>
        <span id="todayOrders">0 รายการ</span>
      </div>

      <div class="stat-card">
        <b>ยอดขายทั้งหมด</b>
        <span id="allSales">0 บาท</span>
      </div>
    </section>

    <section class="card">
      <div class="actions">
        <button type="button" onclick="loadOrders()">รีเฟรชออเดอร์</button>
      </div>

      <label>
        ค้นหาออเดอร์
        <input id="adminSearch" type="text" placeholder="ค้นหา: ชื่อลูกค้า / LINE ID / เลขออเดอร์ / สถานะ / ยอดเงิน" />
      </label>

      <div class="section-head">
        <h2>รายการออเดอร์ทั้งหมด</h2>
        <p class="muted">ค้นหาได้จากชื่อ ลูกค้า LINE ID ช่องทางติดต่อ เลขออเดอร์ ลิงก์สินค้า สถานะ หรือยอดเงิน</p>
      </div>

      <div id="orders" class="orders">
        <div class="notice">กำลังโหลดออเดอร์...</div>
      </div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
